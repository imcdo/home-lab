apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: traefik-controller
  namespace: flux-system
spec:
  interval: 5m
  path: ./clusters/k3s/traefik-controller
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cilium
  timeout: 10m
