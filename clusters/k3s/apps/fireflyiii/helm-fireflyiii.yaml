apiVersion: v1
kind: Namespace
metadata:
  name: fireflyiii
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: firefly-iii
  namespace: fireflyiii
spec:
  interval: 10m
  chart:
    spec:
      chart: firefly-iii-stack
      version: "0.9.1"
      sourceRef:
        kind: HelmRepository
        name: firefly-iii
        namespace: fireflyiii
  values:
    importer:
      enabled: false

    firefly-db:
      storage:
        accessModes: ReadWriteOnce

    firefly-iii:
      ingress:
        enabled: true
        className: traefik
        hosts:
          - firefly.home.lan
      config:
        env:
          APP_URL: http://firefly.home.lan
          TRUSTED_PROXIES: "**"